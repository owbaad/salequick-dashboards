<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/includes.js" defer></script>
    <link rel="stylesheet" href="css/main.css">

    <link rel="stylesheet" href="css/sales-marketing.css">
    <title>Admin | Sales and Marketing Overview</title>
</head>

<body data-title="Sales and Marketing Overview">

    <div class="dashboard-container">

        <header class="header card" id="site-header"></header>
        <nav class="nav card" id="site-nav"></nav>

        <!-- Main Content -->
        <main class="main">

            <!-- Date range selector, export button (to .pdf) and last updated element -->
            <!-- Default date range is month-to-date. Allow for all normal options in SQ system though -->
            <div class="main-selector" id="main-selector"></div>
            

            <!-- Marketing Data, pulled mostly from Zoho -->
            <div class="main-marketing card">
                <h1 class="marketing-title">Marketing Analytics</h1>


            </div> <!-- Close main-marketing -->

            
            <!-- Inside Sales Statistics, pulled from Zoho/Justcall -->
            <div class="main-inside card">
                <h1 class="inside-title">Inside Sales Analytics</h1>


            </div> <!-- Close main-inside -->


            <!-- Outside Sales Statistics, pulled from SQ -->
            <div class="main-outside card">
                <h1 class="outside-title">Outside Sales Analytics</h1>


            </div> <!-- Close main-outside -->

        </main> <!-- Close main -->
    </div> <!-- Close dashboard-container --> 

</body>
</html>
