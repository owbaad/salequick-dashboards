<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Admin | Overview</title>
</head>

<body>

    <div class="dashboard-container">
        <div class="header-container">

            <div class="header-left">
                <div class="logo-container">
                    <img class="header-logo" src="images/salequick-logo.png">
                </div>
                
                <div class="header-title">Company Overview</div>
            </div>

            <div class="profile-container">
                <img class="pfp" src="images/profile.png">
                <p class="name">Owen Baadsgaard</p>
            </div>

        </div>

        <div class="sidebar-container">
            <div class="sb-top">
                <img class="sb-collapse" src="images/sidebar-collapse.png">
            </div>

            <ul class="sb-body">
                <li>
                    <img class="sb-image" src="images/dashboard.png">
                    <p class="sb-title">Dashboard</p>
                </li>
                <li>
                    <img class="sb-image" src="images/merchant_icon.png">
                    <p class="sb-title">Merchants</p>
                </li>
                <li>
                    <img class="sb-image" src="images/payment_icon.png">
                    <p class="sb-title">Payments</p>
                </li>
                <li>
                    <img class="sb-image" src="images/reseller_icon.png">
                    <p class="sb-title">Partners</p>
                </li>
                <li>
                    <img class="sb-image" src="images/marketing-icon.png">
                    <p class="sb-title">Marketing</p>
                </li>
            </ul>

            <div class="sb-bottom">
                <p class="powered">Powered By:</p>
                <p class="milstead">Milstead Technologies, LLC</p>
            </div>
        </div>

        <div class="main-container">
        </div>
    </div>
    
</body>

</html>
